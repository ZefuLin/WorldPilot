run_id: WorldPilot
run_root_dir: outputs/worldpilot_train
seed: 42
trackers: [jsonl]
wandb_entity: placeholder
wandb_project: placeholder
is_debug: false


framework:
  name: ABot_M0
  vggt_path: path_to_your_vggt
  qwenvl:
    base_vlm: path_to_your_base_vlm
    attn_implementation: flash_attention_2
    vl_hidden_dim: 2048
  dino:
    dino_backbone: dinov2_vits14
  use_vggt: true
  use_cosmos: true
  cosmos:
    server_host: "127.0.0.1"    
    server_port: 8002            
    drop_prob: 0.2
    cosmos_chunk_size: 16
    cosmos_latent_channels: 16
    cosmos_latent_spatial: 28
  action_model:
    action_model_type: DiT-B
    action_hidden_dim: 1024
    hidden_size: 1024
    add_pos_embed: True
    max_seq_len: 1024
    action_dim: 14
    state_dim: 14
    future_action_window_size: 9
    action_horizon: 10
    past_action_window_size: 0
    repeated_diffusion_steps: 8
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    num_inference_timesteps: 4
    num_target_vision_tokens: 32
    diffusion_model_cfg:
      cross_attention_dim: 2560  
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: "ada_norm"
      num_layers: 16
      output_dim: 1024
      positional_embeddings: null

  reduce_in_full_precision: true


datasets:
  vla_data:
    dataset_py: lerobot_datasets
    data_root_dir: path_to_your_libero_data_root
    data_mix: libero
    action_type: delta_qpos
    include_state: false
    sequential_step_sampling: False
    default_image_resolution: [3, 224, 224]
    cosmos_cache_dir: path_to_your_cosmos_cache_dir
    per_device_batch_size: 8
    num_workers: 4
    load_all_data_for_training: true
    obs: ["image_0"]
    video_backend: pyav


trainer:
  epochs: 100
  max_train_steps: 50000
  num_warmup_steps: 5000
  save_interval: 10000
  eval_interval: 10000
  learning_rate:
    base: 2.5e-05
    qwen_vl_interface: 3.0e-05
    action_model: 1.0e-04
    cosmos_image_fuser: 1.0e-04
    cosmos_action_projector: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: ''
  loss_scale:
    vla: 1.0
    vlm: 0.1
  max_grad_norm: 1.0
  warmup_ratio: 0.1
  weight_decay: 0.0
  logging_frequency: 100
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1

  pretrained_checkpoint: path_to_your_pretrain_ckpt
  reload_modules: qwen_vl_interface,action_model

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08

  is_resume: false
  resume_epoch: null
  resume_step: null
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: true
